name: Update blocklists

on:
  schedule:
    - cron: "0 * * * *"
  workflow_dispatch:

concurrency:
  group: update-lists
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    timeout-minutes: 330
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r scraper/requirements.txt

      - name: Fetch & regenerate lists
        id: fetch
        env:
          TZ: Europe/Istanbul
          DATA_DIR: data
          MIN_DELAY: "5"
          MAX_DELAY: "12"
          INC_MIN_DELAY: "2"
          INC_MAX_DELAY: "6"
          FULL_RESYNC_DAYS: "0"
          TIME_BUDGET_SECONDS: "18000"
        run: |
          set +e
          python scraper/fetch.py
          rc=$?
          set -e
          echo "exit_code=$rc" >> $GITHUB_OUTPUT
          if [ "$rc" -ne 0 ] && [ "$rc" -ne 10 ]; then
            exit "$rc"
          fi

      - name: Commit updated lists
        run: |
          git config user.name "TagoBot"
          git config user.email "tagobot@users.noreply.github.com"
          git add data/
          if git diff --cached --quiet; then
            echo "No changes to commit."
            exit 0
          fi
          git commit -m "chore: update blocklists ($(TZ='Europe/Istanbul' date +'%Y-%m-%d %H:%M UTC+3'))"
          for attempt in 1 2 3 4 5; do
            if git push origin HEAD:main; then
              exit 0
            fi
            git fetch origin main
            if ! git rebase -X theirs origin/main; then
              git rebase --abort || true
            fi
          done
          exit 1

      - name: Re-trigger if crawl still in progress
        if: steps.fetch.outputs.exit_code == '10'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh workflow run update-lists.yml
