services:
  sgblist:
    build: .
    # Or use the prebuilt image pushed by GitHub Actions:
    # image: ghcr.io/<OWNER>/<REPO>:latest
    container_name: sgblist
    restart: unless-stopped
    environment:
      TZ: Europe/Istanbul
      DATA_DIR: /data
      # First (full) crawl pacing — keep it polite to avoid rate limiting.
      MIN_DELAY: "10"
      MAX_DELAY: "50"
      # Incremental (hourly) pacing — only a few pages, so it can be quicker.
      INC_MIN_DELAY: "3"
      INC_MAX_DELAY: "10"
      # Checkpoint the long crawl every ~55 min.
      TIME_BUDGET_SECONDS: "3300"
      # Re-crawl everything weekly to detect entries removed at the source.
      FULL_RESYNC_DAYS: "7"
    volumes:
      # Output lists + database. Point a firewall at the files in ./data.
      - ./data:/data
