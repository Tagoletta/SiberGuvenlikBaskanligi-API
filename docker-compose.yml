services:
  sgblist:
    build: .
    container_name: sgblist
    restart: unless-stopped
    environment:
      TZ: Europe/Istanbul
      DATA_DIR: /data
      MIN_DELAY: "10"
      MAX_DELAY: "50"
      INC_MIN_DELAY: "3"
      INC_MAX_DELAY: "10"
      TIME_BUDGET_SECONDS: "3300"
      FULL_RESYNC_DAYS: "7"
    volumes:
      - ./data:/data
